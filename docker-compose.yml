version: "3.9"

services:
  node1:
    build: . # <-- CHANGED: Tells Docker to use Dockerfile
    image: hadoop-cluster # <-- CHANGED: Names custom image
    container_name: node01
    hostname: node01
    ports:
      - "8481:8480"
      - "9871:9870"
      - "8081:8088"
      - "8020:8020" # NameNode RPC, needed for DistCp but missing 9866 port
    extra_hosts:
      - "dr-node01:100.115.195.121" # DR_TAILSCALE_IP FOR NN
      - "dr-node03:100.115.195.121" # DR_TAILSCALE_IP FOR JN
    environment:
      # <-- ADDED
      - NODE_ROLE=node01
    command: bash -c "cp /run.sh /tmp/run.sh && dos2unix /tmp/run.sh && bash /tmp/run.sh" # <-- CHANGED: Triggers orchestrator
    volumes:
      - ./shared:/shared
      - ./run.sh:/run.sh # <-- ADDED: Mounts the script
      - node01-data:/opt/hadoop/data # <-- ADDED
      - node01-zk:/opt/zookeeper/data # <-- ADDED
    networks:
      - cluster-network
  node2:
    image: hadoop-cluster
    container_name: node02
    hostname: node02
    ports:
      - "8482:8480"
      - "9872:9870"
      - "8082:8088"
    extra_hosts:
      - "dr-node01:100.115.195.121" # DR_TAILSCALE_IP FOR NN
      - "dr-node03:100.115.195.121" # DR_TAILSCALE_IP FOR JN
    command: bash -c "service ssh start && sleep infinity"
    volumes:
      - ./shared:/shared
    networks:
      - cluster-network

  node3:
    image: hadoop-cluster
    container_name: node03
    hostname: node03
    ports:
      - "8483:8480"
      - "9873:9870"
      - "8083:8088"
      - "9866:9866" # HDFS DataNode, needed for DistCp (first node)
    extra_hosts:
      - "dr-node01:100.115.195.121" # DR_TAILSCALE_IP FOR NN
      - "dr-node03:100.115.195.121" # DR_TAILSCALE_IP FOR JN
    command: bash -c "service ssh start && sleep infinity"
    volumes:
      - ./shared:/shared
    networks:
      - cluster-network

  node4:
    image: hadoop-cluster
    container_name: node04
    hostname: node04
    ports:
      - "8484:8480"
      - "9874:9870"
      - "8084:8088"
    extra_hosts:
      - "dr-node01:100.115.195.121" # DR_TAILSCALE_IP FOR NN
      - "dr-node03:100.115.195.121" # DR_TAILSCALE_IP FOR JN
    command: bash -c "service ssh start && sleep infinity"
    volumes:
      - ./shared:/shared
    networks:
      - cluster-network

  node5:
    image: hadoop-cluster
    container_name: node05
    hostname: node05
    ports:
      - "8485:8480"
      - "9875:9870"
      - "8085:8088"
    extra_hosts:
      - "dr-node01:100.115.195.121" # DR_TAILSCALE_IP FOR NN
      - "dr-node03:100.115.195.121" # DR_TAILSCALE_IP FOR JN
    command: bash -c "service ssh start && sleep infinity"
    volumes:
      - ./shared:/shared
    networks:
      - cluster-network

networks:
  cluster-network:
    driver: bridge
# <-- ADDED: Named Volumes
volumes:
  node01-data:
  node01-zk:

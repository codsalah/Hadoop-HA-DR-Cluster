version: "3.9"

services:
  dr-node01:
    build: . 
    image: hadoop-cluster:latest 
    container_name: dr-node01
    hostname: dr-node01
    ports:
      - "9871:9870"
      - "8081:8088"
      - "8481:8480"
      - "2181:2181"
      - "8020:8020" # NameNode RPC
    environment: 
      - NODE_ROLE=dr-node01
    command: bash -c "cp /run.sh /tmp/run.sh && dos2unix /tmp/run.sh && bash /tmp/run.sh"
    volumes:
      - ./shared:/shared
      - ./run.sh:/run.sh 
      - dr-node01-data:/opt/hadoop/data 
      - dr-node01-zk:/opt/zookeeper/data 
    networks:
      - cluster-network
    extra_hosts:
      - "node01:100.75.183.48"
      - "node02:100.75.183.48"
      - "node03:100.75.183.48"
      - "node04:100.75.183.48"
      - "node05:100.75.183.48"

  dr-node02:
    image: hadoop-cluster:latest
    container_name: dr-node02
    hostname: dr-node02
    ports:
      - "9872:9870"
      - "8082:8088"
      - "8482:8480"
      - "2182:2181"
    environment:
      - NODE_ROLE=dr-node02
    command: bash -c "service ssh start && sleep infinity"
    volumes:
      - ./shared:/shared
      - dr-node02-data:/opt/hadoop/data
      - dr-node02-zk:/opt/zookeeper/data
    networks:
      - cluster-network
    extra_hosts:
      - "node01:100.75.183.48"
      - "node02:100.75.183.48"
      - "node03:100.75.183.48"
      - "node04:100.75.183.48"
      - "node05:100.75.183.48"

  dr-node03:
    image: hadoop-cluster:latest
    container_name: dr-node03
    hostname: dr-node03
    ports:
      - "8483:8480"
      - "2183:2181"
      - "8083:8042"
      - "9866:9866" # DataNode Transfer
    environment:
      - NODE_ROLE=dr-node03
    command: bash -c "service ssh start && sleep infinity"
    volumes:
      - ./shared:/shared
      - dr-node03-data:/opt/hadoop/data
      - dr-node03-zk:/opt/zookeeper/data
    networks:
      - cluster-network
    extra_hosts:
      - "node01:100.75.183.48"
      - "node02:100.75.183.48"
      - "node03:100.75.183.48"
      - "node04:100.75.183.48"
      - "node05:100.75.183.48"

  dr-node04:
    image: hadoop-cluster:latest
